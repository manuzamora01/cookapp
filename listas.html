<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CookApp - Listas</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="icon" href="imagen.png" type="image/png">
</head>
<body style="background-color: var(--color-blanco);">

  <div class="top-header" style="display: flex; align-items: center; gap: 15px;">
    <a href="perfil.html" style="color: white; font-size: 24px;"><i class="bi bi-arrow-left"></i></a>
    <span>Mis Listas</span>
  </div>

  <div class="tabs-container" style="margin-top: 20px;">
    <button class="tab-btn active" onclick="cambiarPestaña('misCategorias', this)">Categorías</button>
    <button class="tab-btn" onclick="cambiarPestaña('misDietas', this)">Dietas</button>
    <button class="tab-btn" onclick="cambiarPestaña('misAlergenos', this)">Alérgenos</button>
  </div>

  <div class="main-content" style="padding-top: 0;">
    <div style="display: flex; gap: 10px; margin-bottom: 20px; padding: 0 20px;">
      <input type="text" id="input-nuevo" class="app-input" style="margin: 0; padding: 10px;" placeholder="Añadir nuevo...">
      <button class="btn-app" style="margin: 0; width: auto; padding: 10px 20px;" onclick="añadirItem()">Añadir</button>
    </div>

    <div id="contenedor-lista" style="padding: 0 20px;"></div>
  </div>

  <script type="module" src="js/listas.js"></script>
</body>
</html>
