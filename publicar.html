<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CookApp - Publicar</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body style="background-color: var(--color-fondo);">

  <div class="main-content">
    <h2 style="color: var(--color-primario); font-weight: bold; margin-bottom: 20px; text-align: center;">Sube tu receta</h2>

    <form id="form-publicar">
      
      <div class="file-upload-wrapper">
        <i class="bi bi-camera" style="font-size: 30px; color: #888;"></i>
        <p style="color: #888; margin: 5px 0 0 0;">Toca para añadir foto</p>
        <input type="file" id="foto-input" accept="image/*" required>
        <img id="foto-preview" class="file-preview" src="">
      </div>

      <input type="text" class="app-input" id="titulo" placeholder="Nombre de la receta" required>
      <input type="text" class="app-input" id="categoria" placeholder="Categoría (ej: Postres)" required>
      
      <label style="font-weight: bold; margin-bottom: 5px; display: block;">Tipo de dieta:</label>
      <select class="app-input" id="dieta">
        <option value="Ninguna">Ninguna</option>
        <option value="Vegetariana">Vegetariana</option>
        <option value="Vegana">Vegana</option>
      </select>

      <label style="font-weight: bold; margin-bottom: 5px; display: block;">Alérgenos (escríbelos separados por comas):</label>
      <input type="text" class="app-input" id="alergenos" placeholder="Ej: Gluten, Lácteos, Nueces">

      <textarea class="app-input" id="ingredientes" placeholder="Ingredientes..." required></textarea>
      <textarea class="app-input" id="preparacion" placeholder="Pasos de preparación..." required></textarea>

      <button type="submit" class="btn-app" id="btn-submit">Publicar Receta</button>
    </form>
    
  </div>

  <nav class="nav-bar">
    <a href="inicio.html" class="nav-item">
      <i class="bi bi-house"></i>
      <span>Inicio</span>
    </a>
    <a href="publicar.html" class="nav-item active">
      <i class="bi bi-plus-circle-fill"></i>
      <span>Publicar</span>
    </a>
    <a href="#" class="nav-item" onclick="alert('Próximamente: Tu Perfil')">
      <i class="bi bi-person"></i>
      <span>Perfil</span>
    </a>
  </nav>

  <script type="module" src="js/publicar.js"></script>
</body>
</html>
