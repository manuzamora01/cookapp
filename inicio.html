<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CookApp - Inicio</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
</head>
<body style="background-color: var(--color-fondo);">

  <div class="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h2 style="color: var(--color-primario); font-weight: bold; margin: 0;">Inicio</h2>
      <button id="btn-logout" class="btn-app" style="width: auto; padding: 5px 15px; margin: 0; font-size: 14px; border-radius: 20px; background-color: #FF5A5A;">Salir</button>
    </div>

    <div class="app-input" style="display: flex; align-items: center; padding: 10px 15px; margin-bottom: 20px;">
      <i class="bi bi-search" style="color: #888; margin-right: 10px;"></i>
      <input type="text" placeholder="Buscar receta o @apodo..." style="border: none; background: transparent; width: 100%; outline: none; font-size: 16px;">
    </div>

    <div id="loading" style="text-align: center; color: var(--color-primario); padding: 40px;">
      <i class="bi bi-arrow-repeat" style="font-size: 2rem; display: inline-block; animation: spin 1s linear infinite;"></i>
      <p style="margin-top: 10px;">Cargando recetas...</p>
    </div>

    <div class="recipe-grid" id="recipe-container"></div>
  </div>

  <nav class="nav-bar">
    <a href="inicio.html" class="nav-item active">
      <i class="bi bi-house-fill"></i>
      <span>Inicio</span>
    </a>
    <a href="publicar.html" class="nav-item">
        <i class="bi bi-plus-circle"></i>
        <span>Publicar</span>
    </a>
    <a href="perfil.html" class="nav-item">
      <i class="bi bi-person"></i>
      <span>Perfil</span>
    </a>
  </nav>

  <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>

  <script type="module" src="js/app.js"></script>

  <div class="modal-overlay" id="modal-receta">
    <div class="modal-content">
      <button class="btn-close-modal" onclick="cerrarModal()"><i class="bi bi-x"></i></button>
      <img id="modal-img" src="" alt="Foto" class="modal-img">
      <h2 id="modal-title" style="color: var(--color-texto); font-weight: bold; margin-bottom: 5px;"></h2>
      <p id="modal-author" style="color: var(--color-primario); font-weight: bold; margin-bottom: 15px;"></p>
      
      <div id="modal-tags" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;"></div>
      
      <h4 style="font-size: 16px; font-weight: bold;">Ingredientes:</h4>
      <div style="background: #F1F3F4; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
        <p id="modal-ingredients" style="margin: 0; white-space: pre-wrap;"></p>
      </div>

      <h4 style="font-size: 16px; font-weight: bold;">Preparación:</h4>
      <p id="modal-steps" style="white-space: pre-wrap; margin-bottom: 30px; line-height: 1.5;"></p>
    </div>
  </div>
</body>
</html>
